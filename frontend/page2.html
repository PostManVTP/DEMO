<html>

<body>

<h2>Đây là Page 2</h2>

<button onclick="loadImage()">Hiển thị ảnh 2- TEST WEB leu leu</button>
<button onclick="goPage1()">Sang Page 1</button>

<br><br>

<img id="img" width="400"/>

<script>

async function loadImage() {

    const response = await fetch("https://demo-v3im.onrender.com/get-image");

    const data = await response.json();

    document.getElementById("img").src = data.image;

}
function goPage1(){

    window.location.href = "/";

}

</script>
